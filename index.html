<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Cat - Ectoplasm Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #121212;
            overflow: hidden;
            font-family: sans-serif;
        }

        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0b0b0b;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }

        .btn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            background-color: #39ff14;
            color: black;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #2eb810;
        }

        #error-log {
            color: #ff5555;
            margin-top: 20px;
            font-family: monospace;
            max-width: 80%;
            text-align: center;
        }

        #game-box {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #cat {
            position: absolute;
            font-size: 50px;
            cursor: pointer;
            user-select: none;
            display: none;
            z-index: 2;
        }

        #game-over-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            font-size: 24px;
            color: #aaaaaa;
        }
