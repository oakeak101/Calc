<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Cat - Metal Splatter Fixed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #121212;
            overflow: hidden;
            font-family: sans-serif;
        }

        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0b0b0b;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }

        .btn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            background-color: #8b0000;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #ff0000;
        }

        #game-box {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #cat {
            position: absolute;
            font-size: 50px;
            cursor: pointer;
            user-select: none;
            display: none;
            z-index: 2;
        }

        #game-over-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            font-size: 24px;
            color: #aaaaaa;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            pointer-events: none;
            z-index: 5;
        }

        .effect {
            position: absolute;
            font-weight: bold;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
            z-index: 4;
        }

        .success-effect {
            color: #4CAF50;
        }

        .fail-effect {
            color: #F44336;
        }

        .gore-particle {
            position: absolute;
            background-color: #8b0000;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
            animation: explode 0.4s ease-out forwards;
        }

        .chunk {
            border-radius: 2px;
            background-color: #5c0000;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>CAT SLAYER</h1>
        <p>Click start to begin loop.</p>
        <button class="btn" id="start-btn">START GAME</button>
    </div>

    <div id="ui-layer">
        <div>Clicks: <span id="ui-clicks">0</span></div>
        <div>Misses: <span id="ui-misses">0</span>/5</div>
    </div>

    <div id="game-box">
        <div id="cat">🐈</div>
    </div>

    <div id="game-over-screen">
        <h1>Defeat</h1>
        <p>Times clicked: <span id="final-clicks">0</span></p>
    </div>

    <script>
        const cat = document.getElementById('cat');
        const gameBox = document.getElementById('game-box');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const gameOverScreen = document.getElementById('game-over-screen');
        const uiClicks = document.getElementById('ui-clicks');
        const uiMisses = document.getElementById('ui-misses');
        const finalClicks = document.getElementById('final-clicks');

        let clicks = 0;
        let misses = 0;
        let catTimeout = null;
        let isGameOver = false;

        let audioCtx = null;
        let audioLoopInterval = null;
        let currentStep = 0;

        const D2 = 73.42;
        const F2 = 87.31;
        const G2 = 98.00;
        const Gs2 = 103.83;

        const guitarPattern = [
            D2, D2, F2, D2,  G2, D2, Gs2, G2,
            D2, D2, F2, D2,  G2, F2, D2,  0
        ];

        function initAudio() {
            // Setup audio context safely
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            // Force resume if browser suspended it
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            if (audioLoopInterval) return;

            const stepDuration = 60 / 140 / 2; 

            audioLoopInterval = setInterval(() => {
                if (isGameOver) return;
                if (!audioCtx || audioCtx.state === 'suspended') return;
                
                const time = audioCtx.currentTime;
                
                if (currentStep % 2 === 0 || currentStep % 7 === 0) {
                    const kick = audioCtx.createOscillator();
                    const kickGain = audioCtx.createGain();
                    kick.connect(kickGain);
                    kickGain.connect(audioCtx.destination);
                    kick.frequency.setValueAtTime(150, time);
                    kick.frequency.exponentialRampToValueAtTime(0.01, time + 0.15);
                    kickGain.gain.setValueAtTime(1.0, time);
                    kickGain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
                    kick.start(time);
                    kick.stop(time + 0.16);
                }

                if (currentStep % 4 === 2) {
                    const bufferSize = audioCtx.sampleRate * 0.1;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }
                    const noise = audioCtx.createBufferSource();
                    noise.buffer = buffer;
                    const noiseFilter = audioCtx.createBiquadFilter();
                    noiseFilter.type = 'bandpass';
                    noiseFilter.frequency.value = 1000;
                    const noiseGain = audioCtx.createGain();
                    noiseGain.gain.setValueAtTime(0.5, time);
                    noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                    noise.connect(noiseFilter);
                    noiseFilter.connect(noiseGain);
                    noiseGain.connect(audioCtx.destination);
                    noise.start(time);
                    noise.stop(time + 0.11);
                }

                const note = guitarPattern[currentStep % guitarPattern.length];
                if (note > 0) {
                    const osc = audioCtx.createOscillator();
                    const osc2 = audioCtx.createOscillator();
                    const guitarGain = audioCtx.createGain();
                    const distFilter = audioCtx.createBiquadFilter();

                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(note, time);
                    osc2.type = 'sawtooth';
                    osc2.frequency.setValueAtTime(note * 1.01, time);

                    distFilter.type = 'lowpass';
                    distFilter.frequency.value = 800; 

                    guitarGain.gain.setValueAtTime(0.4, time);
                    guitarGain.gain.exponentialRampToValueAtTime(0.01, time + stepDuration * 0.9);

                    osc.connect(distFilter);
                    osc2.connect(distFilter);
                    distFilter.connect(guitarGain);
                    guitarGain.connect(audioCtx.destination);

                    osc.start(time);
                    osc2.start(time);
                    osc.stop(time + stepDuration);
                    osc2.stop(time + stepDuration);
                }

                currentStep++;
            }, stepDuration * 1000);
        }

        function getDisplayTime() {
            if (clicks >= 100) return 100;
            return 1000 - (clicks * 9);
        }

        function createEffect(text, className, x, y) {
            const effect = document.createElement('div');
            effect.className = `effect ${className}`;
            effect.textContent = text;
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.body.appendChild(effect);
            setTimeout(() => { effect.remove(); }, 600);
        }

        function createGoreExplosion(x, y) {
            const particleCount = 15;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'gore-particle';
                if (Math.random() > 0.6) particle.classList.add('chunk');

                const size = Math.floor(Math.random() * 8
