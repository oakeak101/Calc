<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Cat - Ritual Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #050000;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* LAYER 1: Core Metrics */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffcccc;
            font-family: 'Creepster', cursive;
            pointer-events: none;
            z-index: 1; 
            text-shadow: 0 0 10px #ff0000;
            letter-spacing: 3px;
        }

        .ui-small-text {
            font-size: 4vh;
            margin: 0;
            opacity: 0.9;
            line-height: 1;
        }

        .distortion-chamber {
            perspective: 400px;
            margin-top: -10vh; 
            margin-bottom: 2vh;
        }

        #ui-clicks {
            display: block;
            font-size: 50vh; 
            line-height: 0.8;
            color: #ff0000;
            text-shadow: 0 0 40px #aa0000, 0 0 10px #ff0000;
            transform: rotateX(45deg) scaleY(1.2); 
            transform-origin: bottom center;
        }

        /* LAYER 2: Environment Overlays */
        #hell-overlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 100%, rgba(90, 0, 0, 0.4) 0%, rgba(26, 0, 0, 0.6) 60%, rgba(0, 0, 0, 0.9) 100%);
            pointer-events: none;
            z-index: 2;
        }

        #fire-layer {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 30vh;
            background: linear-gradient(to top, rgba(255, 69, 0, 0.7), transparent);
            pointer-events: none;
            z-index: 3;
            animation: flicker 3s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.6; transform: scaleY(1); }
            50% { opacity: 0.8; transform: scaleY(1.1); }
            100% { opacity: 0.5; transform: scaleY(0.9); }
        }

        /* LAYER 3: Interactive/Particle Elements */
        #game-box {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4;
        }

        @keyframes panic {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-15deg); }
            50% { transform: scale(1) rotate(0deg); }
            75% { transform: scale(1.1) rotate(15deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        #cat {
            position: absolute;
            font-size: 50px;
            cursor: pointer;
            user-select: none;
            display: none;
            z-index: 5;
            animation: panic 0.3s infinite linear;
            filter: drop-shadow(0 0 5px rgba(255,100,100,0.5));
        }

        .effect {
            position: absolute; font-weight: bold; font-family: 'Creepster', cursive; font-size: 32px;
            pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 6;
        }

        .success-effect { color: #ff0000; text-shadow: 0 0 10px black; }
        .fail-effect { color: #555555; text-shadow: 0 0 10px black; }

        .red-splat-particle {
            position: absolute; background-color: #ff0000; border-radius: 50%;
            pointer-events: none; z-index: 6; animation: explode 0.4s ease-out forwards;
            box-shadow: 0 0 5px #aa0000;
        }
        
        .chunk { border-radius: 20%; background-color: #8b0000; }

        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-50px); opacity: 0; } }
        @keyframes explode { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }

        /* Screens */
        #start-screen, #game-over-screen, #countdown-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #0b0b0b;
            z-index: 20; display: flex; justify-content: center; align-items: center; flex-direction: column;
            color: white; text-align: center;
        }

        #game-over-screen {
            display: none; background-color: rgba(0, 0, 0, 0.95); color: #ff4444; text-shadow: 0 0 10px #ff0000;
        }

        /* Countdown specific styles */
        #countdown-screen {
            display: none;
            background-color: rgba(10, 0, 0, 0.9);
            color: #ff0000;
            font-family: 'Creepster', cursive;
            font-size: 25vh;
            text-shadow: 0 0 30px #ff0000;
            z-index: 25;
        }

        .zoom-throb {
            animation: zoomPulse 1s linear forwards;
        }

        @keyframes zoomPulse {
            0% { transform: scale(0.5); opacity: 0; }
            20% { transform: scale(1); opacity: 1; }
            80% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .final-command {
            font-size: 12vh !important;
            animation: shakeCommand 1.5s ease-in-out forwards !important;
        }

        @keyframes shakeCommand {
            0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
            10% { transform: scale(1.2); opacity: 1; filter: blur(0px); }
            20% { transform: translate(10px, 10px) scale(1.1); }
            30% { transform: translate(-10px, -10px) scale(1.1); }
            40% { transform: translate(10px, -10px) scale(1.1); }
            50% { transform: translate(-10px, 10px) scale(1.1); }
            60% { transform: translate(0, 0) scale(1); }
            100% { transform: scale(2); opacity: 0; }
        }

        .btn {
            padding: 15px 30px; font-size: 24px; font-family: 'Creepster', cursive; letter-spacing: 2px;
            background-color: #aa0000; color: white; border: 1px solid #ff4444;
            cursor: pointer; border-radius: 5px; margin-top: 20px; box-shadow: 0 0 10px #aa0000;
        }
        .btn:hover { background-color: #ff0000; box-shadow: 0 0 20px #ff0000; }

        h1 { font-family: 'Creepster', cursive; font-size: 80px; margin-bottom: 10px; letter-spacing: 5px; }
        p { font-size: 24px; color: #dddddd; }
        #error-log { color: #ff5555; margin-top: 20px; font-family: monospace; max-width: 80%; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="ui-small-text">SCORE</div>
        <div class="distortion-chamber">
            <span id="ui-clicks">0</span>
        </div>
        <div class="ui-small-text">FELINES CRUSHED</div>
        <div class="ui-small-text" style="margin-top: 2vh; font-size: 2.5vh; color: #880000;">
            MISSES: <span id="ui-misses">0</span> / 5
        </div>
    </div>

    <div id="hell-overlay"></div>
    <div id="fire-layer"></div>

    <div id="game-box">
        <div id="cat">🐈</div>
    </div>

    <div id="start-screen">
        <h1>CAT SLAYER: INFERNO</h1>
        <p>EMBRACE YOUR INFERNAL DESIRES, KILL THEM ALL.</p>
        <button class="btn" onclick="initiateRitual()">DESCEND</button>
        <div id="error-log"></div>
    </div>

    <div id="countdown-screen">
        <div id="countdown-text">3</div>
    </div>

    <div id="game-over-screen">
        <h1>SOUL CONSUMED</h1>
        <p>Entities destroyed: <span id="final-clicks">0</span></p>
        <button class="btn" onclick="location.reload()">REINCARNATE</button>
    </div>

    <script>
        const cat = document.getElementById('cat');
        const startScreen = document.getElementById('start-screen');
        const countdownScreen = document.getElementById('countdown-screen');
        const countdownText = document.getElementById('countdown-text');
        const gameOverScreen = document.getElementById('game-over-screen');
        
        let clicks = 0;
        let misses = 0;
        let catTimeout = null;
        let isGameOver = false;
        let audioCtx = null;
        let audioLoopInterval = null;

        function initAudioContext() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return; 
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function initiateRitual() {
            startScreen.style.display = 'none';
            try { initAudioContext(); } catch (err) { console.log("Audio boot failed."); }
            
            countdownScreen.style.display = 'flex';
            let count = 3;
            
            countdownText.textContent = count;
            countdownText.className = 'zoom-throb';
            playDeepThud();

            const tick = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownText.style.animation = 'none';
                    void countdownText.offsetWidth; // Force reflow to restart animation
                    countdownText.textContent = count;
                    countdownText.style.animation = 'zoomPulse 1s linear forwards';
                    playDeepThud();
                } else {
                    clearInterval(tick);
                    countdownText.style.animation = 'none';
                    countdownText.textContent = "CLICK THEM ALL";
                    countdownText.className = 'final-command';
                    
                    playDemonicVoice();
                    
                    setTimeout(() => {
                        countdownScreen.style.display = 'none';
                        isGameOver = false;
                        startMetalLoop();
                        moveCat();
                    }, 1800); // Wait for the voice/animation to end before starting game
                }
            }, 1000);
        }

        function playDeepThud() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const time = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(120, time);
            osc.frequency.exponentialRampToValueAtTime(10, time + 0.8);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(1, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.8);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(time);
            osc.stop(time + 0.85);
        }

        function playDemonicVoice() {
            // Web Speech API for creepy text-to-speech
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance("click them all");
                utterance.pitch = 0.1; // Minimum pitch for monstrous tone
                utterance.rate = 0.5;  // Slow, dragging speed
                utterance.volume = 1;
                window.speechSynthesis.speak(utterance);
            }

            // Web Audio API distortion drone accompanying the voice
            if (audioCtx && audioCtx.state !== 'suspended') {
                const time = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(40, time);
                osc.frequency.linearRampToValueAtTime(20, time + 1.5);
                
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.8, time);
                gain.gain.linearRampToValueAtTime(0.01, time + 1.5);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(time);
                osc.stop(time + 1.6);
            }
        }

        function startMetalLoop() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            
            let currentStep = 0;
            const stepDuration = 60 / 140 / 2;
            const guitarPattern = [73.42, 73.42, 87.31, 73.42, 98.00, 73.42, 103.83, 98.00, 73.42, 73.42, 87.31, 73.42, 98.00, 87.31, 73.42, 0];

            audioLoopInterval = setInterval(() => {
                if (isGameOver || audioCtx.state === 'suspended') return;
                const time = audioCtx.currentTime;
                
                if (currentStep % 2 === 0 || currentStep % 7 === 0) {
                    const kick = audioCtx.createOscillator();
                    const kickGain = audioCtx.createGain();
                    kick.connect(kickGain); kickGain.connect(audioCtx.destination);
                    kick.frequency.setValueAtTime(150, time);
                    kick.frequency.exponentialRampToValueAtTime(0.01, time + 0.15);
                    kickGain.gain.setValueAtTime(1.0, time); kickGain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
                    kick.start(time); kick.stop(time + 0.16);
                }

                const note = guitarPattern[currentStep % guitarPattern.length];
                if (note > 0) {
                    const osc = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator();
                    const guitarGain = audioCtx.createGain(); const distFilter = audioCtx.createBiquadFilter();
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(note, time);
                    osc2.type = 'sawtooth'; osc2.frequency.setValueAtTime(note * 1.01, time);
                    distFilter.type = 'lowpass'; distFilter.frequency.value = 800; 
                    guitarGain.gain.setValueAtTime(0.4, time); guitarGain.gain.exponentialRampToValueAtTime(0.01, time + stepDuration * 0.9);
                    osc.connect(distFilter); osc2.connect(distFilter);
                    distFilter.connect(guitarGain); guitarGain.connect(audioCtx.destination);
                    osc.start(time); osc2.start(time);
                    osc.stop(time + stepDuration); osc2.stop(time + stepDuration);
                }
                currentStep++;
            }, stepDuration * 1000);
        }

        // --- Core Game Functions ---

        function playSplatSound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const time = audioCtx.currentTime;
            const bufferSize = audioCtx.sampleRate * 0.2; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const noiseFilter = audioCtx.createBiquadFilter(); noiseFilter.type = 'lowpass';
            noiseFilter.frequency.setValueAtTime(1500, time); noiseFilter.frequency.exponentialRampToValueAtTime(100, time + 0.15);
            const noiseGain = audioCtx.createGain(); noiseGain.gain.setValueAtTime(0.8, time); noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
            noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
            noise.start(time); noise.stop(time + 0.2);

            const osc = audioCtx.createOscillator(); osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, time); osc.frequency.exponentialRampToValueAtTime(40, time + 0.15);
            const oscGain = audioCtx.createGain(); oscGain.gain.setValueAtTime(0.9, time); oscGain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
            osc.connect(oscGain); oscGain.connect(audioCtx.destination);
            osc.start(time); osc.stop(time + 0.16);
        }

        function playFailSound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const time = audioCtx.currentTime;
            const osc = audioCtx.createOscillator(); osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(110, time); osc.frequency.linearRampToValueAtTime(80, time + 0.4); 
            const oscGain = audioCtx.createGain(); oscGain.gain.setValueAtTime(0.6, time); oscGain.gain.linearRampToValueAtTime(0.01, time + 0.4);
            osc.connect(oscGain); oscGain.connect(audioCtx.destination);
            osc.start(time); osc.stop(time + 0.45);
        }

        function getDisplayTime() {
            if (clicks >= 100) return 100;
            return 1000 - (clicks * 9);
        }

        function createEffect(text, className, x, y) {
            const effect = document.createElement('div'); effect.className = `effect ${className}`; effect.textContent = text;
            effect.style.left = x + 'px'; effect.style.top = y + 'px'; document.body.appendChild(effect);
            setTimeout(() => { effect.remove(); }, 600);
        }

        function createRedSplatter(x, y) {
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div'); particle.className = 'red-splat-particle';
                if (Math.random() > 0.5) particle.classList.add('chunk');
                const size = Math.floor(Math.random() * 12) + 4;
                particle.style.width = size + 'px'; particle.style.height = size + 'px';
                particle.style.left = x + 'px'; particle.style.top = y + 'px';
                const angle = Math.random() * Math.PI * 2; const distance = Math.floor(Math.random() * 100) + 30;
                particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`); particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                document.body.appendChild(particle);
                setTimeout(() => { particle.remove(); }, 400);
            }
        }

        function moveCat() {
            if (isGameOver) return;
            if (catTimeout) clearTimeout(catTimeout);
            const maxX = window.innerWidth - 100; const maxY = window.innerHeight - 100;
            cat.style.left = Math.max(0, Math.floor(Math.random() * maxX)) + 'px'; cat.style.top = Math.max(0, Math.floor(Math.random() * maxY)) + 'px';
            cat.style.display = 'block';
            catTimeout = setTimeout(() => {
                const rect = cat.getBoundingClientRect(); createEffect('MISS', 'fail-effect', rect.left, rect.top); recordMiss();
            }, getDisplayTime());
        }

        function recordMiss() {
            misses++; document.getElementById('ui-misses').textContent = misses; playFailSound();
            if (misses >= 5) {
                isGameOver = true; clearInterval(audioLoopInterval); clearTimeout(catTimeout); cat.style.display = 'none';
                document.getElementById('final-clicks').textContent = clicks; gameOverScreen.style.display = 'flex';
            } else { moveCat(); }
        }

        cat.addEventListener('click', (e) => {
            if (isGameOver) return;
            e.stopPropagation(); clicks++; document.getElementById('ui-clicks').textContent = clicks;
            playSplatSound(); createRedSplatter(e.clientX, e.clientY); createEffect('+1', 'success-effect', e.clientX, e.clientY); moveCat();
        });
    </script>
</body>
</html>
