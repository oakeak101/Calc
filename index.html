<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Cat with Effects</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #121212;
            overflow: hidden;
            font-family: sans-serif;
        }

        #game-box {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #cat {
            position: absolute;
            font-size: 50px;
            cursor: pointer;
            user-select: none;
            display: none;
            z-index: 2;
        }

        #game-over-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            font-size: 24px;
            color: #aaaaaa;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            pointer-events: none;
            z-index: 5;
        }

        .effect {
            position: absolute;
            font-weight: bold;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
            z-index: 4;
        }

        .success-effect {
            color: #4CAF50;
        }

        .fail-effect {
            color: #F44336;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-50px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div>Clicks: <span id="ui-clicks">0</span></div>
        <div>Misses: <span id="ui-misses">0</span>/5</div>
    </div>

    <div id="game-box">
        <div id="cat">🐈</div>
    </div>

    <div id="game-over-screen">
        <h1>Defeat</h1>
        <p>Times clicked: <span id="final-clicks">0</span></p>
    </div>

    <script>
        const cat = document.getElementById('cat');
        const gameBox = document.getElementById('game-box');
        const gameOverScreen = document.getElementById('game-over-screen');
        const uiClicks = document.getElementById('ui-clicks');
        const uiMisses = document.getElementById('ui-misses');
        const finalClicks = document.getElementById('final-clicks');

        let clicks = 0;
        let misses = 0;
        let catTimeout = null;
        let isGameOver = false;

        function getDisplayTime() {
            if (clicks >= 100) return 100;
            return 1000 - (clicks * 9);
        }

        function createEffect(text, className, x, y) {
            const effect = document.createElement('div');
            effect.className = `effect ${className}`;
            effect.textContent = text;
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.body.appendChild(effect);

            setTimeout(() => {
                effect.remove();
            }, 600);
        }

        function moveCat() {
            if (isGameOver) return;

            if (catTimeout) clearTimeout(catTimeout);

            const padding = 100;
            const maxX = window.innerWidth - padding;
            const maxY = window.innerHeight - padding;

            const randomX = Math.max(0, Math.floor(Math.random() * maxX));
            const randomY = Math.max(0, Math.floor(Math.random() * maxY));

            cat.style.left = randomX + 'px';
            cat.style.top = randomY + 'px';
            cat.style.display = 'block';

            catTimeout = setTimeout(() => {
                // Timer expired. Trigger failure effect at cat's current position.
                const rect = cat.getBoundingClientRect();
                createEffect('MISS', 'fail-effect', rect.left, rect.top);
                recordMiss();
            }, getDisplayTime());
        }

        function recordMiss() {
            misses++;
            uiMisses.textContent = misses;

            if (misses >= 5) {
                endGame();
            } else {
                moveCat();
            }
        }

        function endGame() {
            isGameOver = true;
            clearTimeout(catTimeout);
            cat.style.display = 'none';
            finalClicks.textContent = clicks;
            gameOverScreen.style.display = 'flex';
        }

        cat.addEventListener('click', (e) => {
            if (isGameOver) return;
            e.stopPropagation();
            
            clicks++;
            uiClicks.textContent = clicks;
            
            createEffect('+1', 'success-effect', e.clientX, e.clientY);
            moveCat();
        });

        gameBox.addEventListener('click', (e) => {
            if (isGameOver) return;
            
            createEffect('MISS', 'fail-effect', e.clientX, e.clientY);
            recordMiss();
        });

        moveCat();
    </script>
</body>
</html>
